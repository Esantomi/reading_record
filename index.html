<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>김기림 문단 네트워크 & 독서 이력 아카이브</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script type="text/javascript" src="data.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background-color: #f8fafc;
            color: #334155;
        }
        #sidebar {
            width: 38%; height: 100%; border-right: 1px solid #e2e8f0;
            padding: 35px; box-sizing: border-box; overflow-y: auto; background-color: #ffffff;
            display: flex; flex-direction: column;
        }
        #graph-container { width: 62%; height: 100%; position: relative; background-color: #f1f5f9; }
        
        /* 쿼리 질의 섹션 */
        .search-section {
            margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0;
        }
        .search-label { font-size: 9.5pt; font-weight: 700; color: #475569; margin-bottom: 8px; display: block; }
        .search-box {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1;
            font-size: 10pt; box-sizing: border-box; outline: none;
        }
        .search-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        /* 자동완성 드롭다운 추천창 */
        #search-results {
            max-height: 180px; overflow-y: auto; margin-top: 5px; font-size: 9.5pt; 
            background: #fff; border-radius: 4px; border: 1px solid #cbd5e1; display: none;
            position: absolute; width: calc(38% - 70px); z-index: 10; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .search-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .search-item:hover, .search-item.active { background-color: #f1f5f9; }

        .content-view { flex: 1; }
        h1 { font-size: 16pt; font-weight: 800; color: #0f172a; margin-top: 0; margin-bottom: 8px; line-height: 1.3; }
        .subtitle { font-size: 10.5pt; color: #64748b; margin-bottom: 25px; }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 9999px; font-size: 8.5pt; font-weight: 700; margin-bottom: 12px; }
        .badge.writer { background-color: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .badge.book { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .badge.person { background-color: #fdf2f8; color: #9d174d; border: 1px solid #fbcfe8; }
        
        .desc { font-size: 11pt; line-height: 1.6; color: #475569; margin-bottom: 35px; word-break: keep-all; }
        .section-title { font-size: 12pt; font-weight: 700; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 15px; }
        
        .relation-list { padding: 0; margin: 0; list-style: none; }
        .relation-item { padding: 14px; background: #f8fafc; border: 1px solid #f1f5f9; margin-bottom: 10px; border-radius: 8px; font-size: 10pt; line-height: 1.5; }
        .relation-item a { color: #2563eb; font-weight: 700; text-decoration: none; }
        .relation-item a:hover { text-decoration: underline; }
        
        .rel-label { display: inline-block; font-size: 8.5pt; font-weight: 800; color: #64748b; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
        .source-text { font-size: 9pt; color: #64748b; margin-top: 6px; background: #ffffff; padding: 8px; border-left: 3px solid #cbd5e1; border-radius: 2px; font-style: italic; }
        .info-box { background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; color: #166534; font-size: 10pt; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="search-section">
        <label class="search-label" for="searchNode">🔍 온톨로지 개체 검색 (검색어 입력 후 엔터)</label>
        <input type="text" id="searchNode" class="search-box" placeholder="예: 김기림, 파우스트, 홍염, 엘리엇..." autocomplete="off">
        <div id="search-results"></div>
    </div>

    <div class="content-view">
        <div id="welcome-view">
            <h1>김기림 문단 네트워크<br>온톨로지 아카이브</h1>
            <p class="subtitle">연구 데이터 기반 파일럿 웹 서비스</p>
            <div class="info-box">
                💡 상단의 <strong>검색창에 단어를 입력하고 엔터(Enter)</strong>를 누르거나, 오른쪽 시각화 지도에서 노드를 클릭하면 개별 근거 원문이 표출됩니다.
            </div>
        </div>
        
        <div id="detail-view" style="display: none;">
            <span id="node-type" class="badge"></span>
            <h1 id="node-name">개체명</h1>
            <div id="node-desc" class="desc">개체 설명</div>
            
            <div class="section-title">연결된 이력 및 관계망 (Hop-1)</div>
            <ul id="node-relations" class="relation-list"></ul>
        </div>
    </div>
</div>

<div id="graph-container"></div>

<script type="text/javascript">
    const container = document.getElementById('graph-container');
    let network = null;
    let selectedIndex = -1;

    function initGraph() {
        if (typeof LITERARY_DATA === 'undefined') {
            console.error("data.js 파일을 찾을 수 없거나 데이터 변수가 올바르지 않습니다.");
            return;
        }

        const nodesArray = [];
        const checkedNodeIds = new Set(Object.keys(LITERARY_DATA.nodes));

        // 간선(Edges) 예외 방어 컨텍스트 제어
        LITERARY_DATA.edges.forEach(edge => {
            if (!checkedNodeIds.has(edge.from)) {
                LITERARY_DATA.nodes[edge.from] = { id: edge.from, name: edge.from, type: "UNKNOWN", description: "식별 정보 부족 개체" };
                checkedNodeIds.add(edge.from);
            }
            if (!checkedNodeIds.has(edge.to)) {
                LITERARY_DATA.nodes[edge.to] = { id: edge.to, name: edge.to, type: "UNKNOWN", description: "식별 정보 부족 개체" };
                checkedNodeIds.add(edge.to);
            }
        });

        Object.values(LITERARY_DATA.nodes).forEach(node => {
            if(!node.id) return;
            let shape = 'ellipse'; let bgColor = '#dbeafe'; let borderColor = '#3b82f6';
            if (node.type === 'BOOK') { shape = 'box'; bgColor = '#dcfce7'; borderColor = '#22c55e'; }
            else if (node.type === 'PERSON') { shape = 'database'; bgColor = '#fdf2f8'; borderColor = '#ec4899'; }

            nodesArray.push({
                id: node.id, label: node.name, shape: shape,
                color: { background: bgColor, border: borderColor, highlight: { background: '#fef08a', border: '#eab308' } },
                font: { size: 13, color: '#1e293b' }, margin: 10
            });
        });

        const edgesArray = LITERARY_DATA.edges.map(edge => ({
            from: edge.from, to: edge.to, label: edge.label,
            font: { size: 9, color: '#64748b', align: 'middle' },
            arrows: 'to', color: { color: '#cbd5e1', highlight: '#3b82f6' },
            smooth: { type: 'cubicBezier', roundness: 0.5 }
        }));

        const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) };
        const options = {
            physics: { barnesHut: { gravitationalConstant: -3500, centralGravity: 0.25, springLength: 140 } },
            interaction: { hover: true }
        };

        network = new vis.Network(container, data, options);
        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                window.location.hash = params.nodes[0];
            }
        });
    }

    function showSearchResults(query) {
        const resultsDiv = document.getElementById('search-results');
        if (!query) { resultsDiv.style.display = 'none'; return; }
        
        resultsDiv.innerHTML = '';
        let matchCount = 0;
        const matchedNodes = [];

        Object.values(LITERARY_DATA.nodes).forEach(node => {
            if (node.name && node.name.toLowerCase().includes(query)) {
                matchedNodes.push(node);
            }
        });

        matchedNodes.forEach((node) => {
            matchCount++;
            const item = document.createElement('div');
            item.className = 'search-item';
            item.dataset.id = node.id;
            item.innerHTML = `<strong>${node.name}</strong> <span style="font-size:8pt; color:#94a3b8;">(${node.type})</span>`;
            
            item.onclick = () => {
                window.location.hash = node.id;
                resultsDiv.style.display = 'none';
                document.getElementById('searchNode').value = node.name;
            };
            resultsDiv.appendChild(item);
        });

        if (matchCount > 0) { resultsDiv.style.display = 'block'; }
        else {
            resultsDiv.innerHTML = '<div style="padding:8px 12px; color:#94a3b8;">일치하는 개체가 없습니다.</div>';
            resultsDiv.style.display = 'block';
        }
        selectedIndex = -1;
    }

    function handleRoute() {
        const nodeId = window.location.hash.replace('#', '');
        const node = LITERARY_DATA.nodes[nodeId];

        if (!node || !node.id) {
            document.getElementById('welcome-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            if (network) network.unselectNodes();
            return;
        }

        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        
        const typeBadge = document.getElementById('node-type');
        let typeName = '연구자/문인';
        if (node.type === 'BOOK') typeName = '도서/문헌';
        if (node.type === 'PERSON') typeName = '해외인물/개념';
        
        typeBadge.innerText = typeName;
        typeBadge.className = `badge ${node.type ? node.type.toLowerCase() : 'unknown'}`;
        
        document.getElementById('node-name').innerText = node.name;
        document.getElementById('node-desc').innerText = node.description || "정보가 생략된 개체입니다.";

        const relationsList = document.getElementById('node-relations');
        relationsList.innerHTML = '';

        LITERARY_DATA.edges.forEach(edge => {
            if (edge.from === nodeId || edge.to === nodeId) {
                const isSource = edge.from === nodeId;
                const targetId = isSource ? edge.to : edge.from;
                const targetNode = LITERARY_DATA.nodes[targetId] || { name: targetId };
                
                const li = document.createElement('li');
                li.className = 'relation-item';
                let direction = isSource ? `➔ <a href="#${targetId}">${targetNode.name}</a> 지목` : `◀ <a href="#${targetId}">${targetNode.name}</a>에게 지목됨`;
                
                li.innerHTML = `
                    <div><span class="rel-label">${edge.label}</span> ${direction}</div>
                    <div style="margin-top:4px; font-weight:600; color:#475569;">출처: ${edge.source || '미상'}</div>
                    ${edge.quote ? `<div class="source-text">"${edge.quote}"</div>` : ''}
                `;
                relationsList.appendChild(li);
            }
        });

        if (network) {
            network.selectNodes([nodeId]);
            network.focus(nodeId, { scale: 1.1, animation: { duration: 400 } });
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById('searchNode');
        const resultsDiv = document.getElementById('search-results');

        searchInput.addEventListener('input', (e) => {
            showSearchResults(e.target.value.trim().toLowerCase());
        });

        searchInput.addEventListener('keydown', (e) => {
            const items = resultsDiv.getElementsByClassName('search-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (items.length === 0) return;
                if (selectedIndex >= 0) items[selectedIndex].classList.remove('active');
                selectedIndex = (selectedIndex + 1) % items.length;
                items[selectedIndex].classList.add('active');
                items[selectedIndex].scrollIntoView({ block: 'nearest' });
            } 
            else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (items.length === 0) return;
                if (selectedIndex >= 0) items[selectedIndex].classList.remove('active');
                selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                items[selectedIndex].classList.add('active');
                items[selectedIndex].scrollIntoView({ block: 'nearest' });
            } 
            else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedIndex >= 0 && items[selectedIndex]) {
                    items[selectedIndex].click();
                } else if (searchInput.value.trim()) {
                    const query = searchInput.value.trim().toLowerCase();
                    const firstMatch = Object.values(LITERARY_DATA.nodes).find(n => n.name && n.name.toLowerCase().includes(query));
                    if (firstMatch) {
                        window.location.hash = firstMatch.id;
                        searchInput.value = firstMatch.name;
                        resultsDiv.style.display = 'none';
                    }
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target !== searchInput && e.target !== resultsDiv) {
                resultsDiv.style.display = 'none';
            }
        });

        initGraph();
        handleRoute();
    });

    window.addEventListener('hashchange', handleRoute);
</script>
</body>
</html>
